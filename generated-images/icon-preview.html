<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>SVG 图标方案预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#0f1017;color:#e4e5f0;padding:30px;display:flex;flex-direction:column;align-items:center}
h2{font-size:20px;margin-bottom:20px;color:#8b7cf7;text-align:center}
.demo{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-bottom:30px;max-width:900px}
.card{background:#161820;border:1px solid #2a2c38;border-radius:10px;padding:16px;width:180px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.card svg{width:28px;height:28px;stroke:#8b7cf7;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.card .label{font-size:12px;color:#9a9bb8}
.card .old{font-size:11px;color:#5e6078;margin-top:2px}
.section-title{font-size:14px;color:#e4e5f0;margin:20px 0 10px;width:100%;border-bottom:1px solid #2a2c38;padding-bottom:6px}
</style>
</head>
<body>
<h2>SVG 内联图标方案 — 预览</h2>
<p style="color:#5e6078;margin-bottom:24px;font-size:13px;text-align:center">零外部依赖，所有 SVG 内联在 JS 对象中</p>

<!-- 工具栏图标 -->
<div class="demo">
<div class="section-title">🔧 工具栏</div>
<div class="card">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  <div class="label">设置</div>
  <div class="old">← 之前 ⚙</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
  <div class="label">收藏</div>
  <div class="old">← 之前 ⭐</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
  <div class="label">使用说明</div>
  <div class="old">← 之前 ❓</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  <div class="label">手写生图</div>
  <div class="old">← 之前 ✏</div>
</div>
</div>

<!-- 生图区 -->
<div class="demo">
<div class="section-title">🎨 ComfyUI 区</div>
<div class="card">
  <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
  <div class="label">生图</div>
  <div class="old">← 之前 🚀</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
  <div class="label">进度</div>
  <div class="old">← 之前 ⏳</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><polygon points="22 3 22 15 16 15 16 21 8 21 8 15 2 15 2 3 22 3"/></svg>
  <div class="label">停止</div>
  <div class="old">← 之前 ⏹</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
  <div class="label">随机</div>
  <div class="old">← 之前 🎲</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
  <div class="label">尺寸</div>
  <div class="old">← 之前 📐</div>
</div>
</div>

<!-- 状态 -->
<div class="demo">
<div class="section-title">✅ 状态颜色</div>
<div class="card">
  <svg viewBox="0 0 24 24" style="stroke:#4ec97a"><polyline points="20 6 9 17 4 12"/></svg>
  <div class="label" style="color:#4ec97a">成功</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24" style="stroke:#e85d6e"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
  <div class="label" style="color:#e85d6e">错误</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24" style="stroke:#e6a848"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <div class="label" style="color:#e6a848">警告</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24" style="stroke:#8b7cf7"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
  <div class="label" style="color:#8b7cf7">信息</div>
</div>
</div>

<!-- 其他常用 -->
<div class="demo">
<div class="section-title">📦 其他常用</div>
<div class="card">
  <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  <div class="label">下载</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
  <div class="label">收藏</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
  <div class="label">刷新</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
  <div class="label">清空</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
  <div class="label">收藏♥</div>
</div>
<div class="card">
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
  <div class="label">播放</div>
</div>
</div>

<p style="color:#5e6078;font-size:12px;margin-top:20px;text-align:center">
SVG 图标全部内联在 JS 中 · 零外部依赖 · 可随主题色变化<br>
替换量：约 40 个关键图标，覆盖工具栏/按钮/状态/弹窗
</p>
</body>
</html>
